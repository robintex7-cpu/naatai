<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>naatai · Order-Flow Bot</title>
<style>
  :root { --bg:#0b0e14; --panel:#131823; --panel2:#1a2030; --line:#232b3a;
    --text:#e6edf3; --muted:#8b98a9; --green:#2ecc71; --red:#ff5c5c;
    --amber:#f5a623; --blue:#4d9fff; --accent:#6c5ce7; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  .wrap { max-width:1200px; margin:0 auto; padding:20px 16px 70px; }
  header { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
  .brand { font-size:22px; font-weight:800; letter-spacing:.4px; }
  .brand span { color:var(--accent); }
  .sub { color:var(--muted); font-size:12.5px; }
  a { color:var(--blue); text-decoration:none; }
  .links { display:flex; gap:14px; font-weight:600; }
  .banner { margin:14px 0; padding:10px 14px; border-radius:10px; font-size:12.5px;
    background:rgba(245,166,35,.12); border:1px solid rgba(245,166,35,.4); color:var(--amber); }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:13px; margin-top:16px; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px; position:relative; }
  .card.buy { border-left:4px solid var(--green); }
  .card.sell { border-left:4px solid var(--red); }
  .card.wait { border-left:4px solid var(--muted); }
  .top { display:flex; justify-content:space-between; align-items:baseline; }
  .sym { font-size:18px; font-weight:800; }
  .px { color:var(--muted); font-size:13px; font-variant-numeric:tabular-nums; }
  .sig { display:inline-block; margin:9px 0 6px; padding:5px 14px; border-radius:9px; font-weight:800; font-size:14px; letter-spacing:.5px; }
  .sig.buy { background:rgba(46,204,113,.15); color:var(--green); }
  .sig.sell { background:rgba(255,92,92,.15); color:var(--red); }
  .sig.wait { background:rgba(139,152,169,.14); color:var(--muted); }
  .gauge { height:12px; border-radius:999px; overflow:hidden; display:flex; margin:6px 0 3px; background:var(--panel2); }
  .gauge i { display:block; height:100%; }
  .gl { display:flex; justify-content:space-between; font-size:10.5px; color:var(--muted); }
  .kv { display:flex; justify-content:space-between; padding:4px 0; font-size:12.5px;
    border-bottom:1px dashed var(--line); font-variant-numeric:tabular-nums; }
  .kv:last-of-type { border-bottom:0; }
  .kv .k { color:var(--muted); }
  .tag { display:inline-block; padding:2px 8px; border-radius:6px; background:var(--panel2);
    border:1px solid var(--line); font-size:11px; }
  .up { color:var(--green); } .dn { color:var(--red); } .mut { color:var(--muted); }
  .trade { margin-top:9px; padding-top:8px; border-top:1px solid var(--line); }
  .trade .row { display:flex; justify-content:space-between; padding:3px 0; font-size:12.5px; font-variant-numeric:tabular-nums; }
  h2.sec { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin:22px 0 6px; }
  footer { margin-top:26px; color:var(--muted); font-size:12px; text-align:center; line-height:1.6; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="brand">naat<span>ai</span> · order-flow bot</div>
      <div class="sub" id="sub">Loading…</div>
    </div>
    <div class="links">
      <a href="chart.html">📈 live chart</a>
      <a href="index.html">perp scanner</a>
    </div>
  </header>

  <div class="banner" id="banner"></div>

  <h2 class="sec">Active signals</h2>
  <div class="grid" id="active"></div>

  <h2 class="sec">All symbols (watching)</h2>
  <div class="grid" id="watch"></div>

  <footer id="foot"></footer>
</div>

<script>
const $ = id => document.getElementById(id);
const pctBar = up => `<div class="gauge"><i style="width:${up}%;background:var(--green)"></i>`+
  `<i style="width:${100-up}%;background:var(--red)"></i></div>`+
  `<div class="gl"><span>▲ up ${up}%</span><span>down ${100-up}% ▼</span></div>`;

function card(s){
  const cls = s.signal==="BUY"?"buy":s.signal==="SELL"?"sell":"wait";
  const ls = s.last_signal;
  const trade = ls ? `
    <div class="trade">
      <div class="row"><span class="mut">Last ${ls.type} · ${ls.bars_ago===0?"this candle":ls.bars_ago+" bars ago"}</span><span class="mut">${ls.at}</span></div>
      <div class="row"><span class="mut">Entry</span><span>${ls.entry}</span></div>
      <div class="row"><span class="mut">Stop loss</span><span class="dn">${ls.sl} (−1R)</span></div>
      <div class="row"><span class="mut">Take profit</span><span class="up">${ls.tp} (+2R)</span></div>
    </div>` : "";
  return `<div class="card ${cls}">
    <div class="top"><span class="sym">${s.symbol}</span><span class="px">${s.price}</span></div>
    <div><span class="sig ${cls}">${s.signal}</span></div>
    ${pctBar(s.up_prob)}
    <div class="kv"><span class="k">Delta</span><span class="${s.delta>=0?"up":"dn"}">${s.delta_pct>=0?"+":""}${s.delta_pct}%</span></div>
    <div class="kv"><span class="k">RSI(14)</span><span>${s.rsi ?? "—"}</span></div>
    <div class="kv"><span class="k">Trend / HTF 4h</span><span>${s.trend} · <b class="${s.htf_up?"up":"dn"}">${s.htf_up==null?"—":s.htf_up?"UP":"DOWN"}</b></span></div>
    <div class="kv"><span class="k">Heikin Ashi 1h</span><span class="${s.ha_up?"up":"dn"}">${s.ha_up==null?"—":s.ha_up?"UP":"DOWN"}${s.ha_flip?" ⟲ flip":""}</span></div>
    <div class="kv"><span class="k">Fib 0.618</span><span>${s.fib_618 ?? "—"}</span></div>
    ${trade}
  </div>`;
}

fetch("signals.json?_="+Date.now()).then(r=>r.json()).then(d=>{
  $("sub").textContent = "Bot run "+new Date(d.meta.generated_at).toLocaleString()+" · "+d.meta.source;
  $("banner").textContent = "🤖 "+d.meta.note;
  const active = d.symbols.filter(s=>s.signal!=="WAIT");
  const watch  = d.symbols.filter(s=>s.signal==="WAIT");
  $("active").innerHTML = active.length? active.map(card).join("") :
    `<div class="card wait"><span class="mut">No active BUY/SELL signals right now — the bot is waiting for a clean setup. That is normal; most candles are not tradeable.</span></div>`;
  $("watch").innerHTML = watch.map(card).join("");
  const e=d.meta.engine;
  $("foot").innerHTML = `Engine: delta ≥ ${e.delta_threshold_pct}% on ≥ ${e.min_volume_x_avg}× avg volume, `+
    `${e.htf_trend} filter, stop ${e.stop_atr_mult}×ATR, TP ${e.take_profit_R}R · refreshes every 15 min via GitHub Actions.<br/>`+
    `Educational tool, NOT financial advice. Futures use leverage — you can lose more than your margin.`;
}).catch(e=>{ $("banner").textContent = "Could not load signals.json — the bot may not have run yet. "+e; });
</script>
</body>
</html>
