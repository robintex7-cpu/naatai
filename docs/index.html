<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>naatai · Trading Dashboard</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131823; --panel2: #1a2030; --line: #232b3a;
    --text: #e6edf3; --muted: #8b98a9; --green: #2ecc71; --red: #ff5c5c;
    --amber: #f5a623; --blue: #4d9fff; --accent: #6c5ce7;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 24px 18px 60px; }
  header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .brand { font-size: 26px; font-weight: 700; letter-spacing: .5px; }
  .brand span { color: var(--accent); }
  .demo-banner {
    margin: 18px 0; padding: 10px 14px; border-radius: 10px;
    background: rgba(245,166,35,.12); border: 1px solid rgba(245,166,35,.4);
    color: var(--amber); font-size: 13.5px;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 760px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px;
  }
  .card h2 { margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .regime-badge { display: inline-block; padding: 6px 14px; border-radius: 999px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .bar { height: 8px; border-radius: 999px; background: var(--panel2); overflow: hidden; margin: 6px 0 12px; }
  .bar > i { display: block; height: 100%; }
  .pill { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .sym-card { margin-top: 16px; }
  .sym-head { display: flex; align-items: baseline; justify-content: space-between; }
  .sym-name { font-size: 20px; font-weight: 700; }
  .sym-price { color: var(--muted); }
  .decision { display: flex; align-items: center; gap: 12px; margin: 14px 0; padding: 14px; border-radius: 12px; }
  .decision.go { background: rgba(46,204,113,.10); border: 1px solid rgba(46,204,113,.4); }
  .decision.no { background: rgba(255,92,92,.08); border: 1px solid rgba(255,92,92,.35); }
  .decision .big { font-size: 22px; font-weight: 800; letter-spacing: .5px; }
  .models { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .models th, .models td { text-align: left; padding: 7px 6px; border-bottom: 1px solid var(--line); font-size: 13.5px; }
  .models th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }
  .num { font-variant-numeric: tabular-nums; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--muted); }
  .kv { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed var(--line); }
  .kv:last-child { border-bottom: 0; }
  .kv .k { color: var(--muted); }
  .pipeline { display: flex; flex-wrap: wrap; gap: 8px; }
  .stage { padding: 7px 11px; border-radius: 9px; background: var(--panel2); border: 1px solid var(--line); font-size: 12.5px; }
  .stage .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; background: var(--amber); }
  .rationale { color: var(--muted); font-size: 13px; margin-top: 4px; }
  footer { margin-top: 30px; color: var(--muted); font-size: 12.5px; text-align: center; }
  a { color: var(--blue); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">naat<span>ai</span> · trading dashboard</div>
    <div id="asof" class="sym-price"></div>
  </header>

  <div class="demo-banner" id="banner">Loading…</div>

  <div class="grid">
    <div class="card">
      <h2>Market Regime</h2>
      <div id="regime"></div>
    </div>
    <div class="card">
      <h2>Pipeline Status</h2>
      <div class="pipeline" id="pipeline"></div>
      <div class="rationale" style="margin-top:10px">Each stage is wired and tested. Amber = stub awaiting implementation; turns green once real logic is added.</div>
    </div>
  </div>

  <div id="symbols"></div>

  <footer>
    naatai — modular AI trading system ·
    <a href="https://github.com/robintex7-cpu/naatai" target="_blank" rel="noopener">source on GitHub</a><br/>
    Demo dashboard. Not investment advice. No live trading is performed.
  </footer>
</div>

<script>
const regimeColors = { bull: "#2ecc71", bear: "#ff5c5c", chop: "#f5a623", high_vol: "#4d9fff", crisis: "#ff5c5c", unknown: "#8b98a9" };
const fmtPct = x => (x*100).toFixed(1) + "%";
const fmtSignedPct = x => (x>=0?"+":"") + (x*100).toFixed(2) + "%";
const fmtUsd = x => "$" + Number(x).toLocaleString("en-US");
const dirClass = x => x > 0.001 ? "up" : (x < -0.001 ? "down" : "flat");

function render(d) {
  document.getElementById("asof").textContent = "as of " + new Date(d.meta.generated_at).toLocaleString();
  document.getElementById("banner").textContent =
    "● " + d.meta.mode + " MODE — " + d.meta.note + " Horizon: " + d.meta.horizon + ".";

  // Regime
  const r = d.regime, rc = regimeColors[r.label] || "#8b98a9";
  let rh = `<span class="regime-badge" style="background:${rc}22;color:${rc};border:1px solid ${rc}66">${r.label}</span>
            <span style="margin-left:10px;color:var(--muted)">confidence ${fmtPct(r.confidence)}</span><div style="margin-top:12px">`;
  for (const [k,v] of Object.entries(r.probabilities)) {
    const c = regimeColors[k] || "#8b98a9";
    rh += `<div class="kv"><span class="k">${k}</span><span class="num">${fmtPct(v)}</span></div>
           <div class="bar"><i style="width:${v*100}%;background:${c}"></i></div>`;
  }
  document.getElementById("regime").innerHTML = rh + "</div>";

  // Pipeline
  document.getElementById("pipeline").innerHTML = d.pipeline.map(s =>
    `<div class="stage"><span class="dot"></span>${s.stage}</div>`).join("");

  // Symbols
  document.getElementById("symbols").innerHTML = d.symbols.map(s => {
    const go = s.decision.action === "TAKE TRADE";
    const rows = s.models.map(m => `
      <tr><td>${m.name}</td>
          <td class="num ${dirClass(m.direction)}">${fmtSignedPct(m.direction/10)}</td>
          <td class="num">${fmtPct(m.confidence)}</td></tr>`).join("");
    return `
    <div class="card sym-card">
      <div class="sym-head">
        <div class="sym-name">${s.symbol}</div>
        <div class="sym-price num">${fmtUsd(s.price)}</div>
      </div>
      <div class="decision ${go ? "go":"no"}">
        <div class="big ${go ? "up":"down"}">${s.decision.action}</div>
        <div>
          <span class="pill" style="background:${go?"#2ecc7122":"#ff5c5c22"};color:${go?"#2ecc71":"#ff5c5c"}">${s.decision.side}</span>
          ${go ? `<span style="margin-left:8px">size ${fmtUsd(s.decision.size_usd)} · risk cap ${fmtUsd(s.decision.max_loss_usd)}</span>` : ""}
          <div class="rationale">${s.decision.rationale}</div>
        </div>
      </div>
      <div class="grid">
        <div>
          <h2 style="color:var(--muted)">Model Forecasts</h2>
          <table class="models">
            <tr><th>model</th><th>signal</th><th>conf.</th></tr>
            ${rows}
          </table>
        </div>
        <div>
          <h2 style="color:var(--muted)">Ensemble</h2>
          <div class="kv"><span class="k">P(up)</span><span class="num">${fmtPct(s.ensemble.p_up)}</span></div>
          <div class="bar"><i style="width:${s.ensemble.p_up*100}%;background:${s.ensemble.p_up>=0.5?"#2ecc71":"#ff5c5c"}"></i></div>
          <div class="kv"><span class="k">Expected return (${d.meta.horizon})</span><span class="num ${dirClass(s.ensemble.expected_return)}">${fmtSignedPct(s.ensemble.expected_return)}</span></div>
        </div>
      </div>
    </div>`;
  }).join("");
}

fetch("data.json?_=" + Date.now())
  .then(r => r.json())
  .then(render)
  .catch(e => { document.getElementById("banner").textContent = "Could not load data.json — " + e; });
</script>
</body>
</html>
