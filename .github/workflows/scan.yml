name: Scan Binance Perps

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run scanner
        run: python scripts/scan.py
      - name: Commit updated signals
        run: |
          git config user.name  "naatai-bot"
          git config user.email "actions@github.com"
          git add docs/data.json
          if git diff --staged --quiet; then
            echo "No change in signals."
          else
            git commit -m "data: refresh perp signals [skip ci]"
            git push
          fi
